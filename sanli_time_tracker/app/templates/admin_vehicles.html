{% extends "base.html" %}
{% block content %}
<section class="card">
    <h2>Araç QR Kodları</h2>
    <p>Her araç için mesai QR kodu aşağıdadır. QR link formatı: <code>/time?vehicle=vehicle-01</code></p>
</section>

{% for item in vehicle_qrs %}
<section class="card vehicle-qr-card">
    <div>
        <h3>{{ item.vehicle.name }} ({{ item.vehicle.qr_code_slug }})</h3>
        <p><a href="{{ item.time_url }}">{{ item.time_url }}</a></p>
    </div>
    <div>
        <img class="qr-image" src="data:image/png;base64,{{ item.qr_base64 }}" alt="QR {{ item.vehicle.qr_code_slug }}">
    </div>
</section>
{% endfor %}
{% endblock %}
