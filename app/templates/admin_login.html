<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudia Field OS — Yönetici girişi</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="register-page">
  <div class="register-card" style="max-width:420px">
    <h2>Yönetici girişi</h2>
    <p class="muted small" style="margin-bottom:14px">Mesai ve personel yönetimi için oturum açın.</p>
    {% if reset_success %}
    <div class="alert success" style="margin-bottom:12px">Şifreniz güncellendi. Yeni şifrenizle giriş yapabilirsiniz.</div>
    {% endif %}
    {% if error %}
    <div class="alert error" style="margin-bottom:12px">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" name="email" required autocomplete="username" value="{{ email_value or '' }}" placeholder="ornek@gmail.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary large" style="width:100%">Giriş</button>
    </form>
    <p class="small muted" style="margin-top:14px;text-align:center"><a href="/admin-forgot-password">Şifremi unuttum</a></p>
  </div>
</div>
</body>
</html>
