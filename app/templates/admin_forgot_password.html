<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudia Field OS — Şifremi unuttum</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="register-page">
  <div class="register-card" style="max-width:420px">
    <h2>Şifremi unuttum</h2>
    <p class="muted small" style="margin-bottom:14px">Kayıtlı e-posta adresinizi girin. Kayıtlıysa sıfırlama bağlantısı gönderilir.</p>
    {% if message %}
    <div class="alert {% if rate_limited %}error{% else %}success{% endif %}" style="margin:0 0 12px">{{ message }}</div>
    {% endif %}
    {% if not rate_limited %}
    <form method="post" action="/admin-forgot-password">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" name="email" required autocomplete="email" placeholder="ornek@gmail.com">
      </div>
      <button type="submit" class="btn btn-primary large" style="width:100%">Bağlantı gönder</button>
    </form>
    {% endif %}
    <p class="small muted" style="margin-top:16px"><a href="/admin/login">← Girişe dön</a></p>
  </div>
</div>
</body>
</html>
