<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Cloudia Field OS — Araç bulunamadı</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="register-page">
  <div class="register-card" style="max-width:420px">
    <h2>Araç QR kodu bulunamadı.</h2>
    <p class="muted small" style="margin-top:10px">QR kodundaki araç tanımlı değil veya pasif olabilir. Lütfen yöneticinizle iletişime geçin veya güncel QR kullanın.</p>
    {% if slug %}
    <p class="small muted" style="margin-top:12px">Slug: <code class="font-mono">{{ slug }}</code></p>
    {% endif %}
  </div>
</div>
</body>
</html>
