<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudia Field OS — Yeni şifre</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="register-page">
  <div class="register-card" style="max-width:420px">
    <h2>Yeni şifre belirleyin</h2>
    <p class="muted small" style="margin-bottom:14px">En az 8 karakter. Kayıtlı e-posta adresinizle aynı olamaz.</p>
    {% if error %}
    <div class="alert error" style="margin-bottom:12px">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin-reset-password">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="form-group">
        <label>Yeni şifre</label>
        <input type="password" name="new_password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Yeni şifre (tekrar)</label>
        <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary large" style="width:100%">Şifreyi güncelle</button>
    </form>
    <p class="small muted" style="margin-top:16px"><a href="/admin/login">← Girişe dön</a></p>
  </div>
</div>
</body>
</html>
